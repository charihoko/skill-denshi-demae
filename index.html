<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>技能電子出面</title>
<style>
:root{
  --blue:#1f5aae;--blue2:#eaf2ff;--line:#d8e1ec;--text:#14202b;--muted:#667085;--bg:#f4f7fb;--card:#fff;
  --danger:#c0392b;
}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);}
header{position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid var(--line);padding:14px 18px 10px}
h1{font-size:24px;margin:0 0 4px}.sub{font-size:13px;color:var(--muted)}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}.tab{border:0;border-radius:18px;padding:14px 8px;font-weight:800;font-size:18px;background:#e8eef6;color:#213044}.tab.active{background:var(--blue);color:#fff}
main{max-width:720px;margin:0 auto;padding:14px 14px 110px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 1px 4px rgba(20,32,43,.04)}
label{display:block;font-weight:800;margin:10px 0 7px;font-size:15px} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 14px;font-size:17px;background:#fff;color:var(--text)} textarea{min-height:82px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.btn{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px 10px;font-size:17px;font-weight:800;text-align:center}.btn.on{border-color:#2974ff;background:var(--blue2);color:#0f56c8}.btn.primary{background:var(--blue);color:white;border-color:var(--blue);width:100%;padding:16px;font-size:20px;margin-top:10px}
.help{font-size:14px;color:var(--muted);line-height:1.6}.hidden{display:none!important}.readonly{opacity:.45;pointer-events:none}
.kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.kpi{border:1px solid var(--line);border-radius:14px;background:#f9fbfe;text-align:center;padding:12px 6px}.kpi .name{font-weight:800}.kpi .val{font-size:32px;font-weight:900;margin-top:4px}
.list{display:flex;flex-direction:column;gap:10px}.item{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}.item strong{font-size:16px}.item small{display:block;color:var(--muted);margin-top:4px;line-height:1.4}
.footer{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.94);border-top:1px solid var(--line);padding:10px 14px env(safe-area-inset-bottom);display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:20}.footer button{border:1px solid #bcd1ff;background:#eef5ff;color:#0d54b5;border-radius:14px;padding:15px 10px;font-size:18px;font-weight:900}
.warn{background:#fff3cd;border:1px solid #ffe08a;color:#664d03;border-radius:12px;padding:10px;margin:10px 0;font-size:14px;line-height:1.5}
.adminOnly{border-top:1px dashed var(--line);margin-top:10px;padding-top:10px}
@media(max-width:430px){h1{font-size:22px}.tab{font-size:17px;padding:13px 6px}main{padding:10px 10px 106px}.card{border-radius:16px;padding:12px}.grid2,.grid3{gap:8px}.btn{font-size:16px;padding:13px 8px}.kpi .val{font-size:28px}}
</style>
</head>
<body>
<header>
  <h1>技能電子出面</h1>
  <div class="sub">単体HTML版 Ver1.3 / 台帳 <span id="ledgerCount">0</span>件内蔵</div>
  <div class="tabs">
    <button class="tab active" data-tab="input">入力</button>
    <button class="tab" data-tab="confirm">確認</button>
    <button class="tab" data-tab="admin">管理</button>
  </div>
</header>
<main>
<section id="inputPanel">
  <div class="card">
    <label>氏名</label>
    <input id="workerName" list="nameHistory" placeholder="氏名を入力" autocomplete="off">
    <datalist id="nameHistory"></datalist>
    <div class="help" id="storageHelp">保存すると次回から前回の氏名を表示します。</div>
    <label>日付</label>
    <input id="workDate" type="date">
  </div>
  <div class="card">
    <label>勤務区分</label>
    <div class="grid2">
      <button class="btn on" data-kind="normal">通常</button>
      <button class="btn" data-kind="night">夜勤務</button>
      <button class="btn" data-kind="holiday">休日</button>
      <button class="btn" data-kind="rain">雨休</button>
      <button class="btn" data-kind="special">特休</button>
      <button class="btn" data-kind="paid">有給</button>
    </div>
    <div class="help" style="margin-top:8px">休日・雨休・特休・有給を選んだ場合、現場名と勤務時間は入力不要になります。</div>
  </div>
  <div class="card" id="workFields">
    <label>部門</label>
    <select id="categorySelect"></select>
    <label>現場名</label>
    <select id="siteSelect"></select>
    <label>勤務時間</label>
    <div class="grid2">
      <select id="startTime"></select>
      <select id="endTime"></select>
    </div>
  </div>
  <div class="card">
    <label>食事・特殊・通勤</label>
    <div class="grid3">
      <button class="btn toggle" data-opt="meal">食数</button>
      <button class="btn toggle" data-opt="specialA">特殊A</button>
      <button class="btn toggle" data-opt="specialB">特殊B</button>
      <button class="btn toggle" data-opt="commute">通勤</button>
      <button class="btn toggle" data-opt="pickup">送迎</button>
    </div>
    <label>備考</label>
    <textarea id="memo" placeholder="必要な時だけ入力"></textarea>
  </div>
  <div class="card">
    <div class="kpis">
      <div class="kpi"><div class="name">平時</div><div class="val" id="kRegular">7.3</div></div>
      <div class="kpi"><div class="name">残業</div><div class="val" id="kOvertime">0.0</div></div>
      <div class="kpi"><div class="name">深夜</div><div class="val" id="kNight">0.0</div></div>
    </div>
    <div class="help" style="margin-top:10px">給与計算用の内訳は、この画面には表示しません。</div>
    <button class="btn primary" id="saveBtn">保存する</button>
  </div>
</section>
<section id="confirmPanel" class="hidden">
  <div class="card"><h2>入力履歴</h2><div class="list" id="historyList"></div></div>
</section>
<section id="adminPanel" class="hidden">
  <div class="card">
    <h2>管理者確認</h2>
    <div class="warn">この画面だけ給与計算用の内部内訳を表示します。技能者入力画面には表示しません。</div>
    <div class="grid2">
      <button class="btn" id="csvBtn">CSV出力</button>
      <button class="btn" id="clearBtn">全削除（試験用）</button>
    </div>
    <div class="list" id="adminList" style="margin-top:10px"></div>
  </div>
</section>
</main>
<div class="footer">
  <button id="reloadBtn">台帳再読込</button>
  <button id="showInputBtn">入力を見る</button>
</div>

function safeStorage(){
  try{
    const k="__test__"; window.localStorage.setItem(k,"1"); window.localStorage.removeItem(k);
    return window.localStorage;
  }catch(e){ return null; }
}
const store = safeStorage();
const memory = { history: [], names: [] };
const $ = (id)=>document.getElementById(id);
const state = { kind:"normal", opts:{meal:false,specialA:false,specialB:false,commute:false,pickup:false} };

function getStore(key, fallback){
  if(!store) return fallback;
  try{ return JSON.parse(store.getItem(key)) ?? fallback; }catch(e){ return fallback; }
}
function setStore(key, val){
  if(!store) return false;
  try{ store.setItem(key, JSON.stringify(val)); return true; }catch(e){ return false; }
}
function toDateInput(d=new Date()){
  const z=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
}
function makeTimes(){
  const out=[];
  for(let h=0; h<24; h++){
    for(const m of [0,30]){
      out.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);
    }
  }
  return out;
}
function fillTimes(){
  const opts=makeTimes().map(t=>`<option value="${t}">${t}</option>`).join("");
  $("startTime").innerHTML=opts; $("endTime").innerHTML=opts;
}
function hmToMin(s){ const [h,m]=s.split(":").map(Number); return h*60+m; }
function overlap(a1,a2,b1,b2){ return Math.max(0, Math.min(a2,b2)-Math.max(a1,b1)); }
function fmtCompany(minutes){
  minutes=Math.max(0, Math.round(minutes/30)*30);
  const h=Math.floor(minutes/60), m=minutes%60;
  return `${h}.${m>=30?3:0}`;
}
function calcWork(start, end, kind){
  if(["holiday","rain","special","paid"].includes(kind)){
    return {regular:"0.0", overtime:"0.0", night:"0.0", overtime1:"0.0", overtime025:"0.0", night025:"0.0"};
  }
  let s=hmToMin(start), e=hmToMin(end); if(e<=s) e+=1440;
  const work=e-s;
  const base=9*60, rest=90, regular=Math.max(0, Math.min(work, base)-rest);
  const overtime=Math.max(0, work-base);
  const night1s=22*60, night1e=29*60; // 22:00-翌5:00
  const totalNight=overlap(s,e,night1s,night1e);
  const regularEnd=s+base;
  const nightOutside=overlap(Math.max(s,regularEnd),e,night1s,night1e);
  return {
    regular: fmtCompany(regular),
    overtime: fmtCompany(overtime),
    night: fmtCompany(nightOutside),
    overtime1: fmtCompany(overtime),
    overtime025: fmtCompany(totalNight),
    night025: fmtCompany(nightOutside)
  };
}
function categories(){
  return [...new Set(LEDGER.map(x=>x.category).filter(Boolean))];
}
function loadLedger(){
  $("ledgerCount").textContent = LEDGER.length;
  const cats=categories();
  $("categorySelect").innerHTML = cats.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
  const lastCat=getStore("lastCat", cats[0] || "");
  if(cats.includes(lastCat)) $("categorySelect").value=lastCat;
  fillSites();
}
function escapeHtml(s){return String(s??"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function fillSites(){
  const cat=$("categorySelect").value;
  const sites=LEDGER.filter(x=>x.category===cat);
  $("siteSelect").innerHTML = `<option value="">選択してください</option>` + sites.map(x=>`<option value="${escapeHtml(x.code)}">${escapeHtml(x.name)}</option>`).join("");
  const lastSite=getStore("lastSite","");
  if([...$("siteSelect").options].some(o=>o.value===lastSite)) $("siteSelect").value=lastSite;
}
function updateKind(kind){
  state.kind=kind;
  document.querySelectorAll("[data-kind]").forEach(b=>b.classList.toggle("on", b.dataset.kind===kind));
  const off=["holiday","rain","special","paid"].includes(kind);
  $("workFields").classList.toggle("readonly", off);
  if(kind==="night"){ $("startTime").value="20:00"; $("endTime").value="05:00"; }
  if(kind==="normal"){ $("startTime").value="08:00"; $("endTime").value="17:00"; }
  updateCalc();
}
function updateCalc(){
  const r=calcWork($("startTime").value,$("endTime").value,state.kind);
  $("kRegular").textContent=r.regular; $("kOvertime").textContent=r.overtime; $("kNight").textContent=r.night;
}
function refreshNames(){
  const names = store ? getStore("nameHistory",[]) : memory.names;
  $("nameHistory").innerHTML=names.map(n=>`<option value="${escapeHtml(n)}"></option>`).join("");
  const last=store ? getStore("lastName","") : "";
  if(last && !$("workerName").value) $("workerName").value=last;
  if(!store) $("storageHelp").textContent="SharePointプレビュー等では前回氏名の保存が無効になる場合があります。";
}
function currentRecord(){
  const cat=$("categorySelect").value, opt=$("siteSelect").selectedOptions[0];
  const site=LEDGER.find(x=>x.code===$("siteSelect").value);
  const c=calcWork($("startTime").value,$("endTime").value,state.kind);
  return {
    date:$("workDate").value, name:$("workerName").value.trim(), kind:state.kind,
    category:cat, siteCode:site?.code||"", siteName:site?.name||"",
    start:$("startTime").value, end:$("endTime").value,
    meal:state.opts.meal, specialA:state.opts.specialA, specialB:state.opts.specialB, commute:state.opts.commute, pickup:state.opts.pickup,
    memo:$("memo").value.trim(), calc:c, savedAt:new Date().toLocaleString("ja-JP")
  };
}
function kindLabel(k){return ({normal:"通常",night:"夜勤務",holiday:"休日",rain:"雨休",special:"特休",paid:"有給"}[k]||k);}
function optLabels(r){return [["meal","食数"],["specialA","特殊A"],["specialB","特殊B"],["commute","通勤"],["pickup","送迎"]].filter(([k])=>r[k]).map(([,v])=>v).join("、") || "なし";}
function saveRecord(){
  const r=currentRecord();
  if(!r.name){ alert("氏名を入力してください。"); return; }
  if(!["holiday","rain","special","paid"].includes(r.kind) && !r.siteCode){ alert("現場名を選択してください。"); return; }
  const hist = store ? getStore("history",[]) : memory.history;
  hist.unshift(r); hist.splice(100);
  if(store){ setStore("history",hist); setStore("lastName",r.name); setStore("lastCat",r.category); setStore("lastSite",r.siteCode); }
  else { memory.history=hist; }
  const names = store ? getStore("nameHistory",[]) : memory.names;
  const newNames=[r.name,...names.filter(n=>n!==r.name)].slice(0,30);
  if(store) setStore("nameHistory",newNames); else memory.names=newNames;
  refreshNames(); renderLists(); alert("保存しました。");
}
function renderLists(){
  const hist=store ? getStore("history",[]) : memory.history;
  $("historyList").innerHTML = hist.length ? hist.map(itemHtml).join("") : `<div class="help">まだ入力履歴はありません。</div>`;
  $("adminList").innerHTML = hist.length ? hist.map(adminHtml).join("") : `<div class="help">まだ入力履歴はありません。</div>`;
}
function itemHtml(r){
  return `<div class="item"><strong>${escapeHtml(r.date)}　${escapeHtml(r.name)}　${kindLabel(r.kind)}</strong>
  <small>${escapeHtml(r.category)} / ${escapeHtml(r.siteName || "現場入力不要")}<br>${escapeHtml(r.start)}～${escapeHtml(r.end)}　平時 ${r.calc.regular}　残業 ${r.calc.overtime}　深夜 ${r.calc.night}<br>食事・特殊・通勤：${escapeHtml(optLabels(r))}${r.memo?`<br>備考：${escapeHtml(r.memo)}`:""}</small></div>`;
}
function adminHtml(r){
  return `<div class="item"><strong>${escapeHtml(r.date)}　${escapeHtml(r.name)}　${kindLabel(r.kind)}</strong>
  <small>${escapeHtml(r.category)} / ${escapeHtml(r.siteName || "現場入力不要")}<br>${escapeHtml(r.start)}～${escapeHtml(r.end)}
  <br>平時 ${r.calc.regular} / 残業1.0 ${r.calc.overtime1} / 残業0.25 ${r.calc.overtime025} / 深夜0.25 ${r.calc.night025}
  <br>食事・特殊・通勤：${escapeHtml(optLabels(r))}${r.memo?`<br>備考：${escapeHtml(r.memo)}`:""}<br>保存：${escapeHtml(r.savedAt)}</small></div>`;
}
function showTab(tab){
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  $("inputPanel").classList.toggle("hidden",tab!=="input");
  $("confirmPanel").classList.toggle("hidden",tab!=="confirm");
  $("adminPanel").classList.toggle("hidden",tab!=="admin");
  renderLists();
}
function csvOut(){
  const hist=store ? getStore("history",[]) : memory.history;
  if(!hist.length){ alert("出力する履歴がありません。"); return; }
  const headers=["日付","氏名","勤務区分","部門","工事コード","現場名","出勤","終業","平時","残業1.0","残業0.25","深夜0.25","食数","特殊A","特殊B","通勤","送迎","備考","保存日時"];
  const rows=hist.map(r=>[r.date,r.name,kindLabel(r.kind),r.category,r.siteCode,r.siteName,r.start,r.end,r.calc.regular,r.calc.overtime1,r.calc.overtime025,r.calc.night025,r.meal,r.specialA,r.specialB,r.commute,r.pickup,r.memo,r.savedAt]);
  const csv=[headers,...rows].map(row=>row.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="電子出面.csv"; a.click(); URL.revokeObjectURL(a.href);
}
function init(){
  fillTimes(); $("workDate").value=toDateInput(); loadLedger(); refreshNames();
  $("startTime").value="08:00"; $("endTime").value="17:00"; updateCalc(); renderLists();
  document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>showTab(b.dataset.tab)));
  document.querySelectorAll("[data-kind]").forEach(b=>b.addEventListener("click",()=>updateKind(b.dataset.kind)));
  document.querySelectorAll(".toggle").forEach(b=>b.addEventListener("click",()=>{const k=b.dataset.opt; state.opts[k]=!state.opts[k]; b.classList.toggle("on",state.opts[k]);}));
  $("categorySelect").addEventListener("change",()=>{ if(store) setStore("lastCat",$("categorySelect").value); fillSites(); });
  $("siteSelect").addEventListener("change",()=>{ if(store) setStore("lastSite",$("siteSelect").value); });
  $("startTime").addEventListener("change",updateCalc); $("endTime").addEventListener("change",updateCalc);
  $("saveBtn").addEventListener("click",saveRecord);
  $("reloadBtn").addEventListener("click",()=>{loadLedger(); alert("台帳を再読込しました。");});
  $("showInputBtn").addEventListener("click",()=>showTab("input"));
  $("csvBtn").addEventListener("click",csvOut);
  $("clearBtn").addEventListener("click",()=>{ if(confirm("試験用の入力履歴を削除しますか？")){ if(store) setStore("history",[]); memory.history=[]; renderLists(); }});
}
document.addEventListener("DOMContentLoaded", init);
